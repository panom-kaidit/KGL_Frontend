<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./directorsDashboard.css">
    <link rel="stylesheet" href="../CSS/layout.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel='stylesheet' href='../CSS/responsive.css' />
</head>
<body>
    <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <img src="../../images/logo/karibu-logo.png" alt="Karibu Logo" />
        </div>

        <ul class="nav_menu">
            <li>
                <a href="./directorsDashboard.html">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="./directorsSalesSummary.html">
                    <i class="fas fa-chart-line"></i>
                    <span>Sales Summary</span>
                </a>
            </li>
            <li>
                <a href="./directorsBranchPerformance.html" class="active">
                    <i class="fas fa-building"></i>
                    <span>Branch Performance</span>
                </a>
            </li>
            <li>
                <a href="./usermanegementDash.html">
                    <i class="fas fa-users icon blue"></i>
                    <span>User Management</span>
                </a>
            </li>
            <li>
                <a href="./directorsProfile.html">
                    <i class="fas fa-user-cog"></i>
                    <span>Profile</span>
                </a>
            </li>
            <li>
                <a href="#" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </li>
        </ul>

    <main class="main-content">

        <div class="top-bar">
            <h2>Branch Performance</h2>

            </div>
        </div>

        <div class="table-container">
            <h3>Branch Performance</h3>
            <div id="branchCards" class="cards">
                <div class="card darkgreen">
                    <h3>Loading branch data...</h3>
                    <h1>Please wait</h1>
                    <p>Total Sales: --</p>
                    <p>Total Credit Sales: --</p>
                    <p>Remaining Stock: -- KG</p>
                </div>
            </div>
        </div>

    </main>

    <script src="../JS/branchPerformance.js"></script>
    <script src="../JS/logout.js"></script>
    </div>

    <script src="../JS/apiConfig.js"></script>
