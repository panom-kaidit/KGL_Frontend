<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management | Director Dashboard</title>
    <link rel="icon" type="image/png" href="../../images/logo/karibu-icon.png">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- Reuse manager user-management styles for identical structure/look -->
    <link rel="stylesheet" href="../CSS/managersDashboard.css">
    <link rel="stylesheet" href="../CSS/usermanagement.css">
    <link rel="stylesheet" href="../CSS/layout.css">
    <link rel="stylesheet" href="../CSS/tables.css">
    <link rel='stylesheet' href='../CSS/responsive.css' />
</head>
<body>
<div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <img src="../../images/logo/karibu-logo.png" alt="Karibu Logo" />
        </div>

        <ul class="nav_menu">
            <li>
                <a href="./directorsDashboard.html">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="./directorsSalesSummary.html">
                    <i class="fas fa-chart-line"></i>
                    <span>Sales Summary</span>
                </a>
            </li>

            <li>
                <a href="./usermanegementDash.html" class="active">
                    <i class="fas fa-users"></i>
                    <span>User Management</span>
                </a>
            </li>
            <li>
                <a href="./directorsProfile.html">
                    <i class="fas fa-user-cog"></i>
                    <span>Profile</span>
                </a>
            </li>
            <li>
                <a href="#" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- MAIN CONTENT (same structure pattern as manager user management) -->
    <main class="content">

        <div class="header um-header">
            <div>
                <h1>User Management</h1>
                <p id="branch-label">Loading users�</p>
            </div>
            <a href="../html/addUser.html" class="btn btn-primary">
                <i class="fas fa-user-plus"></i> Add User
            </a>
        </div>

        <div id="alert-box" class="um-alert hidden" role="alert"></div>

        <div class="controls-bar">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Search by name, email, role or branch..."
                    autocomplete="off"
                >
                <button type="button" id="clearSearch" class="clear-btn" aria-label="Clear search">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="sort-wrapper">
                <span class="sort-label">Sort:</span>
                <button type="button" id="sortAZ" class="sort-btn active" data-sort="az">
                    <i class="fas fa-sort-alpha-down"></i> A�Z
                </button>
                <button type="button" id="sortZA" class="sort-btn" data-sort="za">
                    <i class="fas fa-sort-alpha-up"></i> Z�A
                </button>
            </div>
        </div>
        <p id="resultCount" class="result-count"></p>

        <div class="table-container">
            <table class="sales-table procurement-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Branch</th>
                        <th>Phone</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody">
                    <tr class="loading-row">
                        <td colspan="7" class="text-center">
                            <i class="fas fa-spinner fa-spin"></i>&nbsp; Loading users...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="noResultsMessage" class="no-results" style="display:none;">
            <i class="fas fa-users-slash"></i>
            <h3>No users found</h3>
            <p>No users match your search.</p>
        </div>

    </main>

    <!-- Director-specific user management logic -->
    <script src="../JS/apiConfig.js"></script>
    <script src="../JS/directorUserManagement.js"></script>
    <script src="../JS/logout.js"></script>
</div>
</body>
</html>
