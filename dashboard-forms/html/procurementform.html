<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurement Form</title>
    <link rel="icon" type="image/png" href="../../images/logo/karibu-icon.png">
    <link rel="stylesheet" href="../CSS/procurementform.css">
    <style>
        .error-container {
            display: none;
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .error-container.error {
            display: block;
            background: #fdecea;
            border: 1px solid #f5c2c7;
            color: #b42318;
        }

        .error-container.success {
            display: block;
            background: #e8f5e9;
            border: 1px solid #a5d6a7;
            color: #1b5e20;
        }

        .error-container ul {
            margin: 0;
            padding-left: 18px;
        }

        .supplier-other.hidden {
            display: none;
        }
    </style>

    <link rel='stylesheet' href='../CSS/responsive.css' />
</head>
<body>

    <div class="login-container">

        <!-- Header -->
        <div class="form-header">
            <img src="../../images/logo/karibu-icon.png" alt="Karibu Logo">
            <h1>Karibu</h1>
            <h2>Procurement Form</h2>
            <p>Please fill in the information below</p>
        </div>

        <!-- Form -->
        <form class="form-box" novalidate>

            <div id="formErrors" class="error-container" role="alert"></div>

            <div class="form-group">
                <label for="supplier-select">Dealer Name</label>
                <select class="input" id="supplier-select" name="supplier_select" required>
                    <option value="" disabled selected>Select supplier</option>
                    <option value="Maganjo Farm">Maganjo Farm</option>
                    <option value="Matugga Farm">Matugga Farm</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group supplier-other hidden" id="supplier-other-group">
                <label for="supplier-name-other">Other Supplier Name</label>
                <input class="input" type="text" id="supplier-name-other" name="supplier_name_other" placeholder="Enter supplier name">
            </div>

            <div class="form-group">
                <label for="supplier-contact">Dealer Contact</label>
                <input class="input" type="tel" id="supplier-contact" name="supplier_contact" placeholder="Phone number" required>
            </div>

            <div class="form-group">
                <label for="purchase-date">Purchase Date</label>
                <input class="input" type="date" id="purchase-date" name="purchase_date" required readonly>
            </div>

            <div class="form-group">
                <label for="produce-time">Time of produce</label>
                <input class="input" type="time" id="produce-time" name="produce_time" required>
            </div>

            <div class="form-group">
                <label for="product-name">Product Name</label>
                <input class="input" type="text" id="product-name" name="product_name" placeholder="Product Name" required>
            </div>

            <div class="form-group">
                <label for="product-category">Product Category</label>
                <input class="input" type="text" id="product-category" name="product_category" placeholder="Category">
            </div>

            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input class="input" type="number" id="quantity" name="quantity" min="1000" required>
            </div>

            <div class="form-group">
                <label for="unit-price">Unit Price</label>
                <input class="input" type="number" id="unit-price" name="unit_price" step="0.01" required>
            </div>

            <div class="form-group">
                <label for="selling-price">Selling Price (UgX)</label>
                <input class="input" type="number" id="selling-price" name="selling_price" step="0.01" placeholder="Auto / Manual">
            </div>

            <div class="form-group">
                <label for="branch">Branch</label>
                <select class="input" id="branch" name="branch" required>
                    <option value="" disabled selected>Select branch</option>
                    <option value="Maganjo">Maganjo</option>
                    <option value="Matugga">Matugga</option>
                </select>
            </div>

            <!-- Submit -->
            <div class="submit-btn">
                <button type="submit">Submit Procurement</button>
            </div>

        </form>
    </div>

    <!-- Link to procurement.js -->
    <script src="../JS/procurement.js"></script>


    <script src="../JS/apiConfig.js"></script>
</body>
</html>
