<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Karibu Statistics</title>

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../CSS/sellersDashboard.css" />
    <link rel="stylesheet" href="../CSS/statistics.css" />
    <link rel="stylesheet" href="../CSS/layout.css" />
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel='stylesheet' href='../CSS/responsive.css' />
</head>

<body>
<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <img src="../../images/logo/karibu-logo.png" alt="Karibu Logo" />
        </div>

        <ul class="nav_menu">
            <li>
                <a href="./managersDashboard.html" >
                    <i class="fas fa-home"></i>
                    <span>Overview</span>
                </a>
            </li>

            <li>
                <a href="./managergosell.html" >
                    <i class="fas fa-store"></i>
                    <span>Go Sell</span>
                </a>
            </li>

            <li>
                <a href="./managersProcurement.html">
                    <i class="fas fa-cart-plus"></i>
                    <span>Procurement</span>
                </a>
            </li>

            <li>
                <a href="./statistics.html" class="active">
                    <i class="fas fa-chart-bar"></i><span>Statistics</span>
                </a >
            </li>

            <li>
                <a href="./pricing.html">
                    <i class="fas fa-tags"></i>
                    <span>Pricing</span>
                </a>
            </li>
            <li>
                <a href="./usermanagement.html" >
                    <i class="fas fa-users"></i>
                    <span>User Management</span>
                </a>
            </li>

            <li>
                <a href="./managersProfile.html">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            </li>

            <li>
                <a href="#" id="logout-btn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </li>
        </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main--content">

        <!-- HEADER -->
        <div class="header--wrapper">
            <div class="header--title">
                <span>Overview</span>
                <h2>Statistics</h2>
            </div>
            <div class="user--info">
                <img src="../../images/logo/karibu-icon.png" alt="User Icon" />
            </div>
        </div>

        <!-- STATISTICS CONTAINER -->
        <div class="stats--container">
            
            <!-- Charts Row 1 -->
            <div class="charts--wrapper">
                <div class="chart--card">
                    <h3>Monthly Sales</h3>
                    <canvas id="monthlySalesChart"></canvas>
                </div>
                
                <div class="chart--card">
                    <h3>Customer Activity</h3>
                    <canvas id="customerActivityChart"></canvas>
                </div>
            </div>

            <!-- Charts Row 2 -->
            <div class="charts--wrapper">
                <div class="chart--card full-width">
                    <h3>Yearly Overview</h3>
                    <canvas id="yearlyOverviewChart"></canvas>
                </div>
            </div>

        </div>

    </main>

    <!-- Statistics Script -->
    <script src="../JS/statistics.js"></script>
    <script src="../JS/logout.js"></script>
</div>

    <script src="../JS/apiConfig.js"></script>
</body>
</html>
