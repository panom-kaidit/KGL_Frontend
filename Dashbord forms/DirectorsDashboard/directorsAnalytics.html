<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | Director Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/Dashbord forms/DirectorsDashboard/directorsDashboard.css">
    <link rel="stylesheet" href="/Dashbord forms/CSS/layout.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel='stylesheet' href='/Dashbord forms/CSS/responsive.css' />
</head>
<body>
    <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <img src="/images/logo/karibu logo.png" alt="Karibu Logo" />
        </div>

        <ul class="nav_menu">
            <li>
                <a href="/Dashbord forms/DirectorsDashboard/directorsDashboard.html">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="/Dashbord forms/DirectorsDashboard/directorsSalesSummary.html" >
                    <i class="fas fa-chart-line"></i>
                    <span>Sales Summary</span>
                </a>
            </li>
            <li>
                <a href="/Dashbord forms/DirectorsDashboard/directorsBranchPerformance.html">
                    <i class="fas fa-building"></i>
                    <span>Branch Performance</span>
                </a>
            </li>
            <li>
                <a href="/Dashbord forms/DirectorsDashboard/usermanegementDash.html">
                    <i class="fas fa-users icon blue"></i>
                    <span>User Management</span>
                </a>
            </li>
            <li>
                <a href="/Dashbord forms/DirectorsDashboard/directorsProfile.html">
                    <i class="fas fa-user-cog"></i>
                    <span>Profile</span>
                </a>
            </li>
            <li>
                <a href="#">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </li>
        </ul>
    </aside>


    <!-- MAIN CONTENT -->
    <main class="main-content">
        <!-- TOP BAR -->
        <div class="top-bar">
            <h2>Business Analytics</h2>
            <div class="user-info">
                <span>Welcome, Director</span>
                <img src="/images/logo/karibu icon.png" alt="Director">
            </div>
        </div>

        <!-- ANALYTICS CHARTS GRID -->
        <div class="cards" style="grid-template-columns: 1fr 1fr;">
            
            <!-- Growth Trend -->
            <div class="table-container" style="margin-bottom: 0;">
                <h3><i class="fas fa-chart-line"></i> Monthly Growth Trend</h3>
                <canvas id="growthChart"></canvas>
            </div>

            <!-- Best Performing Products -->
            <div class="table-container" style="margin-bottom: 0;">
                <h3><i class="fas fa-star"></i> Top Products</h3>
                <canvas id="productsChart"></canvas>
            </div>

            <!-- Customer Acquisition -->
            <div class="table-container" style="margin-bottom: 0;">
                <h3><i class="fas fa-users"></i> Customer Segments</h3>
                <canvas id="customerChart"></canvas>
            </div>

            <!-- Expense vs Revenue -->
            <div class="table-container" style="margin-bottom: 0;">
                <h3><i class="fas fa-balance-scale"></i> Revenue vs Expenses</h3>
                <canvas id="financeChart"></canvas>
            </div>

        </div>

    </main>

    <script>
        // Growth Chart
        new Chart(document.getElementById('growthChart'), {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Growth %',
                    data: [5, 8, 12, 10, 15, 18],
                    borderColor: '#1B5E20',
                    fill: true,
                    backgroundColor: 'rgba(27, 94, 32, 0.1)'
                }]
            }
        });

        // Top Products Chart
        new Chart(document.getElementById('productsChart'), {
            type: 'doughnut',
            data: {
                labels: ['Maize', 'Beans', 'Rice', 'Soya', 'Others'],
                datasets: [{
                    data: [40, 25, 20, 10, 5],
                    backgroundColor: ['#1B5E20', '#2E7D32', '#43A047', '#66BB6A', '#81C784']
                }]
            }
        });

        // Customer Chart
        new Chart(document.getElementById('customerChart'), {
            type: 'pie',
            data: {
                labels: ['New Customers', 'Returning', 'Corporate'],
                datasets: [{
                    data: [30, 60, 10],
                    backgroundColor: ['#FFCA28', '#1B5E20', '#1565C0']
                }]
            }
        });

        // Finance Chart
        new Chart(document.getElementById('financeChart'), {
            type: 'bar',
            data: {
                labels: ['Q1', 'Q2', 'Q3', 'Q4'],
                datasets: [
                    {
                        label: 'Revenue',
                        data: [15, 20, 18, 22],
                        backgroundColor: '#1B5E20'
                    },
                    {
                        label: 'Expenses',
                        data: [10, 12, 11, 13],
                        backgroundColor: '#D32F2F'
                    }
                ]
            }
        });
    </script>
    </div>

    <script src="/Dashbord forms/JS/apiConfig.js"></script>
</body>
</html>
