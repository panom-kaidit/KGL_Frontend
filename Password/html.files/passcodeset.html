<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="icon" type="image/png" href="../../images/logo/karibu-icon.png">
    <link rel="stylesheet" href="../css.files/passcodeset.css">

    <link rel='stylesheet' href='../../dashboard-forms/CSS/responsive.css' />
</head>
<body>

    <div class="reset-container">
        <h2>Reset Your Password</h2>
        <p>Enter your email to continue</p>

        <form action="./passwordreset.html" method="GET">

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>
            </div>

            <button type="submit">Next</button>

        </form>
    </div>

</body>
</html>
